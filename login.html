<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Captif - IPD</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="md5.js"></script>
    <script>
        function doLogin() {
            $(if chap-id)
            document.login.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            $(endif)
            document.login.submit();
            return false;
        }
    </script>
</head>
<body>
    <div class="ie-fixMinHeight">
        <div class="main">
            <div class="wrap animated fadeIn">
                <img src="img/logo.jpg" alt="Logo IPD" class="logo">
                <h1>Bienvenue sur le réseau IPD</h1>
                
                <form name="login" action="$(link-login-only)" method="post" $(if chap-id) onSubmit="return doLogin()" $(endif)>
                    <input type="hidden" name="dst" value="$(link-orig)" />
                    <input type="hidden" name="popup" value="true" />
                    
                    <div style="position:relative;">
                        <img src="img/user.svg" class="ico" alt="">
                        <input name="username" type="text" placeholder="Nom d'utilisateur" required />
                    </div>
                    
                    <div style="position:relative;">
                        <img src="img/password.svg" class="ico" alt="">
                        <input name="password" type="password" placeholder="Mot de passe" required/>
                    </div>
                    
                    <input type="submit" value="Se connecter">
                </form>
                
                <div class="info">
                    $(if error)
                        <div style="color: #ff5252; margin-bottom: 20px;">$(error)</div>
                    $(endif)
                    © 2026 Institut Polytechnique Defitech<br>
                    Direction des Systèmes d'Information
                </div>
            </div>
        </div>
    </div>
</body>
</html>
